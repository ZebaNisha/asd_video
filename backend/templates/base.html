
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ASD Vision{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-bg">
    <div class="container-fluid">
        <div class="row">

            <!-- Offcanvas sidebar (mobile) -->
            <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasSidebar" aria-labelledby="offcanvasSidebarLabel">
                <div class="offcanvas-header bg-sidebar">
                    <h5 class="offcanvas-title text-white" id="offcanvasSidebarLabel">ASD Vision</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body p-0 bg-sidebar">
                    <ul class="nav flex-column p-3" id="offcanvasMenu">
                        <li class="nav-item mb-1"><a class="nav-link text-white" href="{{ url_for('dashboard.dashboard') }}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                        <li class="nav-item mb-1"><a class="nav-link text-white" href="{{ url_for('patient.list_patients') }}"><i class="bi bi-people me-2"></i>Patients</a></li>
                        <li class="nav-item mb-1"><a class="nav-link text-white" href="{{ url_for('upload.upload_video') }}"><i class="bi bi-cloud-upload me-2"></i>Upload Analysis</a></li>
                        <li class="nav-item mb-1"><a class="nav-link text-white" href="/predictions"><i class="bi bi-bar-chart me-2"></i>Predictions</a></li>
                        <li class="nav-item mb-1"><a class="nav-link text-white" href="/reports"><i class="bi bi-file-earmark-text me-2"></i>Reports</a></li>
                        <li class="nav-item mb-1"><a class="nav-link text-white" href="/settings"><i class="bi bi-gear me-2"></i>Settings</a></li>
                        <li class="nav-item mt-3"><a class="nav-link text-white" href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>

            <!-- Main content area -->
            <main class="col-12 px-md-4 py-3">
                <!-- Top navbar (desktop & mobile) -->
                <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4 rounded">
                    <div class="container-fluid">
                        <a class="navbar-brand" href="{{ url_for('dashboard.dashboard') }}">ASD Vision</a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasSidebar" aria-controls="offcanvasSidebar">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                                <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.dashboard') }}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                                <li class="nav-item"><a class="nav-link" href="{{ url_for('patient.list_patients') }}"><i class="bi bi-people me-1"></i>Patients</a></li>
                                <li class="nav-item"><a class="nav-link" href="{{ url_for('upload.upload_video') }}"><i class="bi bi-cloud-upload me-1"></i>Upload Analysis</a></li>
                                <li class="nav-item"><a class="nav-link" href="/predictions"><i class="bi bi-bar-chart me-1"></i>Predictions</a></li>
                                <li class="nav-item"><a class="nav-link" href="/reports"><i class="bi bi-file-earmark-text me-1"></i>Reports</a></li>
                                <li class="nav-item"><a class="nav-link" href="/settings"><i class="bi bi-gear me-1"></i>Settings</a></li>
                                <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </nav>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <!-- Toast container -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="toastContainer"></div>
    </div>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
