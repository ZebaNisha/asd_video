{% extends 'base.html' %}
{% block title %}Patient Detail{% endblock %}

{% block header %}
<h1 class="h3 mb-0 text-gray-800">Patient Details</h1>
{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
  <div class="row mb-4">
    <div class="col-md-8">
      <h3 id="patientName"></h3>
      <p><strong>Age:</strong> <span id="patientAge"></span></p>
      <p><strong>Gender:</strong> <span id="patientGender"></span></p>
      <p><strong>Guardian:</strong> <span id="patientGuardian"></span></p>
      <p><strong>Notes:</strong> <span id="patientNotes"></span></p>
    </div>
    <div class="col-md-4 text-end">
      <button class="btn btn-primary mb-2" id="editPatientBtn"><i class="bi bi-pencil"></i> Edit</button>
      <button class="btn btn-danger" id="deletePatientBtn"><i class="bi bi-trash"></i> Delete</button>
    </div>
  </div>

  <!-- Placeholder for future sections like video uploads, predictions, etc. -->
  <div id="patientSections"></div>
</div>
{% endblock %}
